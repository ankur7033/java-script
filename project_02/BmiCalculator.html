<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="BmiCalculator.css" rel="stylesheet">
</head>
<body style="background-color: gray; color: white;">
    <h1>Bmi Calculator</h1>
    <div id="height">height in cm 
        <input type="number" id = "heightInput">
    </div>
    <br>
    <div id="weight">weight in kg <input type="number" id="weightInput"></div>
    <br>
    <button id="calculateBtn">Calculate</button>
    <br><br>
    <textarea id="result"></textarea>
    <h2>BMI Weight Guide</h2>
    <div class="guide">
        <p>Under Weight = Less than 18.6</p>
        <p>Normal Range = 18.6 and 24.9</p>
        <p>Overweight = Greater than 24.9</p>
    </div>
    
    <script src="BmiCalculator.js"></script>
</body>
</html>
